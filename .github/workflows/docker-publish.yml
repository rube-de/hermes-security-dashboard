name: publish-image

# Builds and pushes the container image to GitHub Container Registry (GHCR).
# Two variants are published because the base path is baked at build time:
#   root      -> ghcr.io/<owner>/<repo>:latest          (and :main, :sha-…, :X.Y[.Z])
#   /security -> ghcr.io/<owner>/<repo>:latest-security  (…and -security on every tag)
#
# Uses the built-in GITHUB_TOKEN — no extra secrets. NOTE: the first push creates
# a *private* package; make it public in the repo's Packages settings for
# anonymous pulls.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: root
            base_path: ''
            flavor: latest=auto
          - variant: security
            base_path: /security
            flavor: suffix=-security,onlatest=true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU + Buildx enable the linux/arm64 build below. Drop arm64 from
      # `platforms` if the emulated build is too slow for your needs.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (${{ matrix.variant }})
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: ${{ matrix.flavor }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push (${{ matrix.variant }})
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_PATH=${{ matrix.base_path }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
