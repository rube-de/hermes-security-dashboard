<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Hermes — automated security review dashboard for Oasis Protocol repositories" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>
		<script>
			// Apply persisted theme before first paint to avoid a flash of the wrong theme.
			try {
				var t = localStorage.getItem('hermes-theme');
				document.documentElement.dataset.theme = t === 'light' ? 'light' : 'dark';
			} catch (e) {
				document.documentElement.dataset.theme = 'dark';
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
